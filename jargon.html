    .nav-mobile-footer { display: none !important; }

      .nav-right { display: none; }
      .nav-links { display: none; width: 100%; flex-direction: column; gap: 0; padding: 0.5rem 0 0.8rem; overflow-y: auto; max-height: calc(100svh - 60px); justify-content: flex-start; order: 3; border-top: 1px solid rgba(255,255,255,0.1); }

    .term-card.is-draft { border-left: 4px solid #d4a544; opacity: 0.85; padding-left: 1.05rem; }

    .is-admin .term-card { padding-top: 2.2rem; }

    .modal { background: #2C2C2E; border-radius: 18px; padding: 2rem; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; box-shadow: 0 24px 80px rgba(0,0,0,0.25); }

    .modal input:focus, .modal textarea:focus, .modal select:focus { border-color: var(--gold); background: #2C2C2E; }
    .modal textarea { resize: vertical; min-height: 70px; }
    .modal-actions { display: flex; gap: 0.6rem; margin-top: 1.4rem; }
    .btn-save { flex: 1; background: var(--forest); color: var(--cream); border: none; font-family: 'Jost', sans-serif; font-size: 0.82rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.8rem; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
    .btn-save:hover { background: var(--forest-lt); }
    .btn-cancel { padding: 0.8rem 1.1rem; border: 1px solid #ddd; background: none; font-family: 'Jost', sans-serif; font-size: 0.82rem; color: #666; border-radius: 8px; cursor: pointer; }
    .btn-cancel:hover { background: #f5f5f5; }
    .btn-delete { padding: 0.8rem 1.1rem; border: 1px solid var(--terra); background: #2C2C2E; color: var(--terra); font-family: 'Jost', sans-serif; font-size: 0.82rem; letter-spacing: 0.05em; border-radius: 8px; cursor: pointer; }
    .btn-delete:hover { background: var(--terra); color: #0B0B0B; }

    /* ── FOOTER ── */
    footer { background: var(--forest-dk); color: rgba(245,240,232,0.4); text-align: center; padding: 2rem; font-size: 0.75rem; letter-spacing: 0.1em; }
  </style>
</head>

      if (isAdmin) {
        document.getElementById('btnAdminAdd').style.display = '';
        document.querySelector('.main').classList.add('is-admin');
        if (userHasAdvanced) document.querySelector('.modal').classList.add('user-has-advanced');
        applyViewAsMember();
      }
      buildCategoryNav();
      buildAlphaNav();
      loadTerms();
    });

    function applyViewAsMember() {
      const main = document.querySelector('.main');
      const btn  = document.getElementById('btnViewAsMember');
      if (!main || !btn) return;
      if (viewAsMember) {
        main.classList.add('as-member');
        btn.classList.add('active');
        btn.textContent = LANG === 'es' ? 'Vista de admin' : 'View as admin';
      } else {
        main.classList.remove('as-member');
        btn.classList.remove('active');
        btn.textContent = LANG === 'es' ? 'Vista de miembro' : 'View as member';
      }
    }

    function toggleViewAsMember() {
      viewAsMember = !viewAsMember;
      localStorage.setItem('aoo_viewAsMember', viewAsMember ? '1' : '0');
      applyViewAsMember();
      renderTerms();
    }

    function logOut() { window.location.href = 'logout.html'; }

    async function loadTerms() {
      const { data, error } = await sb.from('jargon_terms').select('*').order('term', { ascending: true });
      if (error) { console.error(error); return; }
      let rows = data || [];
      // Admin: sortera drafts först så review-kö syns överst
      if (isAdmin) {
        rows.sort((a, b) => {
          const aDraft = (a.status || 'published') === 'draft' ? 0 : 1;
          const bDraft = (b.status || 'published') === 'draft' ? 0 : 1;
          if (aDraft !== bDraft) return aDraft - bDraft;
          return (a.term || '').localeCompare(b.term || '');
        });
      }
      allTerms = rows;
      renderTerms();
    }

    function buildCategoryNav() {
      const nav = document.getElementById('categoryNav');
      const all = document.createElement('button');
      all.className = 'cat-btn active';
      all.dataset.cat = 'all';
      all.dataset.en  = 'All';
      all.dataset.es  = 'Todo';
      all.textContent = 'All';
      all.onclick = () => setCategory('all', all);
      nav.appendChild(all);
      CATEGORIES.forEach(c => {
        const b = document.createElement('button');
        b.className = 'cat-btn';
        b.dataset.cat = c.key;
        b.dataset.en  = c.en;
        b.dataset.es  = c.es;
        b.textContent = c.en;
        b.onclick = () => setCategory(c.key, b);
        nav.appendChild(b);
      });
    }

    function setCategory(cat, btn) {
      activeCat = cat;
      document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderTerms();
    }

    function buildAlphaNav() {
      const nav = document.getElementById('alphaNav');
      const letters = ['all', ...'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('')];
      letters.forEach(l => {
        const b = document.createElement('button');
        b.className = 'alpha-btn' + (l === 'all' ? ' active' : '');
        b.textContent = l === 'all' ? '★' : l;
        b.onclick = () => {
          activeAlpha = l;
          document.querySelectorAll('.alpha-btn').forEach(x => x.classList.remove('active'));
          b.classList.add('active');
          renderTerms();
        };
        nav.appendChild(b);
      });
    }

    function getFiltered() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      return allTerms.filter(t => {
        const matchCat   = activeCat === 'all' || t.category === activeCat;
        const matchAlpha = activeAlpha === 'all' || (t.term[0] || '').toUpperCase() === activeAlpha;
        const matchQ     = !q
          || t.term.toLowerCase().includes(q)
          || (t.definition_en || '').toLowerCase().includes(q)
          || (t.definition_es || '').toLowerCase().includes(q);
        // View-as-member: dölj drafts + advanced för admin som tittar som vanlig spelare
        if (isAdmin && viewAsMember) {
          const status = t.status || 'published';
          const access = t.access_level || 'public';
          if (status === 'draft' || access === 'advanced') return false;
        }
        return matchCat && matchAlpha && matchQ;
      });
    }

    function catLabel(key) {
      const c = CATEGORIES.find(x => x.key === key);
      if (!c) return key;
      return LANG === 'es' ? c.es : c.en;
    }

    function renderTerms() {
      const container = document.getElementById('termList');
      const filtered  = getFiltered();
      const totalLbl  = LANG === 'es' ? 'términos' : 'terms';
      const showLbl   = LANG === 'es' ? 'mostrando' : 'showing';
      document.getElementById('termCount').textContent =
        `${allTerms.length} ${totalLbl}${filtered.length !== allTerms.length ? ` · ${showLbl} ${filtered.length}` : ''}`;

      if (!filtered.length) {
        const msg = LANG === 'es'
          ? (allTerms.length === 0 ? 'Aún no hay términos. ¡Añade el primero!' : 'No se encontraron términos.')
          : (allTerms.length === 0 ? 'No terms yet. Add the first one!' : 'No terms found.');
        container.innerHTML = `<div class="empty-state"><div class="icon">📖</div><p>${msg}</p></div>`;
        return;
      }

      // Group by category only when "all" + no alpha + no search are active (i.e. raw browse)
      const searchActive = document.getElementById('searchInput').value.trim() !== '';
      const groupByCat   = activeCat === 'all' && activeAlpha === 'all' && !searchActive;

      if (groupByCat) {
        const groups = {};
        CATEGORIES.forEach(c => groups[c.key] = []);
        filtered.forEach(t => { (groups[t.category] = groups[t.category] || []).push(t); });
        container.innerHTML = CATEGORIES
          .filter(c => groups[c.key] && groups[c.key].length)
          .map(c => `<div class="cat-header">${LANG === 'es' ? c.es : c.en}</div>${groups[c.key].map(termCard).join('')}`)
          .join('');
      } else {
        container.innerHTML = filtered.map(termCard).join('');
      }
    }

    function escapeHtml(s) {
      return (s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function termCard(t) {
      const def = LANG === 'es' ? (t.definition_es || t.definition_en) : (t.definition_en || t.definition_es);
      const ex  = LANG === 'es' ? (t.example_es || t.example_en) : (t.example_en || t.example_es);
      const status = t.status || 'published';
      const access = t.access_level || 'public';
      const cardClasses = ['term-card'];
      if (status === 'draft')      cardClasses.push('is-draft');
      if (access === 'advanced')   cardClasses.push('is-advanced');
      const badges = [];
      if (status === 'draft')      badges.push('<span class="badge badge-draft">Draft</span>');
      if (access === 'advanced')   badges.push('<span class="badge badge-advanced">Advanced</span>');
      const badgesHtml = badges.length ? `<div class="term-badges">${badges.join('')}</div>` : '';
      return `
        <div class="${cardClasses.join(' ')}" id="term-${t.id}">
          ${badgesHtml}
          <button class="term-edit-btn" onclick="openEditModal('${t.id}')" title="Edit">✎</button>
          <div class="term-header">
            <div class="term-name">${escapeHtml(t.term)}</div>
            <div class="term-cat-tag">${escapeHtml(catLabel(t.category))}</div>
          </div>
          <div class="term-def">${escapeHtml(def)}</div>
          ${ex ? `<div class="term-example">${escapeHtml(ex)}</div>` : ''}
        </div>
      `;
    }

    // ── MODAL ──
    function openAddModal() {
      editingId = null;
      document.getElementById('modalTitle').textContent = LANG === 'es' ? 'Añadir término' : 'Add term';
      ['newTerm','newDefEn','newDefEs','newExEn','newExEs'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('newCategory').value = 'general';
      document.getElementById('newStatus').value   = 'draft';
      document.getElementById('newAccess').value   = 'public';
      document.getElementById('btnDelete').style.display = 'none';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function openEditModal(id) {
      if (!isAdmin) return;
      const t = allTerms.find(x => x.id === id);
      if (!t) return;
      editingId = id;
      document.getElementById('modalTitle').textContent = LANG === 'es' ? 'Editar término' : 'Edit term';
      document.getElementById('newTerm').value     = t.term || '';
      document.getElementById('newCategory').value = t.category || 'general';
      document.getElementById('newStatus').value   = t.status || 'published';
      document.getElementById('newAccess').value   = t.access_level || 'public';
      document.getElementById('newDefEn').value    = t.definition_en || '';
      document.getElementById('newDefEs').value    = t.definition_es || '';
      document.getElementById('newExEn').value     = t.example_en || '';
      document.getElementById('newExEs').value     = t.example_es || '';
      document.getElementById('btnDelete').style.display = '';
      document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); editingId = null; }
    function handleOverlay(e) { if (e.target === document.getElementById('modalOverlay')) closeModal(); }

    async function saveTerm() {
      const term = document.getElementById('newTerm').value.trim();
      const defEn = document.getElementById('newDefEn').value.trim();
      const defEs = document.getElementById('newDefEs').value.trim();
      if (!term)  { alert(LANG === 'es' ? 'Introduce un término.' : 'Enter a term.'); return; }
      if (!defEn) { alert(LANG === 'es' ? 'Introduce la definición en inglés.' : 'Enter the English definition.'); return; }
      if (!defEs) { alert(LANG === 'es' ? 'Introduce la definición en español.' : 'Enter the Spanish definition.'); return; }

      const payload = {
        term,
        definition_en: defEn,
        definition_es: defEs,
        example_en:    document.getElementById('newExEn').value.trim() || null,
        example_es:    document.getElementById('newExEs').value.trim() || null,
        category:      document.getElementById('newCategory').value,
        status:        document.getElementById('newStatus').value,
        // Säkerhet: non-advanced users kan inte skapa advanced-rader, force public
        access_level:  userHasAdvanced ? document.getElementById('newAccess').value : 'public'
      };

      let error;
      if (editingId) {
        ({ error } = await sb.from('jargon_terms').update(payload).eq('id', editingId));
      } else {
        ({ error } = await sb.from('jargon_terms').insert(payload));
      }
      if (error) { alert('Error: ' + error.message); return; }
      closeModal();
      await loadTerms();
    }

    async function deleteCurrent() {
      if (!editingId) return;
      const msg = LANG === 'es' ? '¿Eliminar este término?' : 'Delete this term?';
      if (!confirm(msg)) return;
      const { error } = await sb.from('jargon_terms').delete().eq('id', editingId);
      if (error) { alert('Error: ' + error.message); return; }
      closeModal();
      await loadTerms();
    }

    // ── NAV TOGGLE ──
    function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
    document.addEventListener('DOMContentLoaded', function() {
      const nl = document.getElementById('navLinks');
      if (nl) nl.querySelectorAll('a').forEach(a => a.addEventListener('click', () => nl.classList.remove('open')));
    });

    // ── SPRÅKVÄLJARE ──
    let LANG = localStorage.getItem('aoo-lang') || 'en';
    function applyLang(lang) {
      LANG = lang;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-en][data-es]').forEach(el => {
        const txt = el.dataset[lang];
        if (txt !== undefined) {
          if (el.children.length === 0) el.textContent = txt;
          else el.firstChild.textContent = txt;
        }
      });
      // Placeholders
      document.querySelectorAll('[data-en-placeholder][data-es-placeholder]').forEach(el => {
        el.placeholder = lang === 'es' ? el.dataset.esPlaceholder : el.dataset.enPlaceholder;
      });
      const otherLabel = lang === 'en' ? 'ES' : 'EN';
      document.querySelectorAll('#langBtn, #langBtnMobile').forEach(b => b.textContent = otherLabel);
      localStorage.setItem('aoo-lang', lang);
      // Re-render lists that depend on language
      if (typeof allTerms !== 'undefined' && allTerms.length) renderTerms();
    }
    function toggleLang() { applyLang(LANG === 'en' ? 'es' : 'en'); }
    applyLang(LANG);

    // ── VERSION-CHECK ──
    (function() {
      setInterval(function() {
        fetch('version.json?t=' + Date.now()).then(r => r.json()).then(function(d) {
          const stored = localStorage.getItem('aoo-version');
          if (!stored) { localStorage.setItem('aoo-version', d.version); return; }
          if (d.version !== stored && !document.getElementById("update-banner")) {
            var b = document.createElement("div");
            b.id = "update-banner";
            b.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#1C1C1E;color:#E8E6E1;text-align:center;padding:0.75rem 1rem;z-index:9999;font-family:Jost,sans-serif;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:1rem;box-shadow:0 -2px 12px rgba(0,0,0,0.2);";
            const reloadTxt = LANG === 'es' ? 'Recargar' : 'Reload';
            const msgTxt    = LANG === 'es' ? '✨ ¡Sitio actualizado!' : '✨ Site updated!';
            b.innerHTML = msgTxt + " <button onclick='location.reload(true)' style='background:#D4AF37;color:#0B0B0B;border:none;padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;font-weight:600;font-family:Jost,sans-serif;'>" + reloadTxt + "</button>";
            document.body.appendChild(b);
          }
        }).catch(function(){});
      }, 300000);
    })();
  </script>
  <style>
  .lgx-banner{background:var(--sand,#1C1C1E);border-top:1px solid rgba(212,175,55,0.25);border-bottom:1px solid rgba(212,175,55,0.25);padding:12px 18px;text-align:center;}
  .lgx-team{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.12em;font-size:1rem;color:var(--terra,#D4AF37);text-transform:uppercase;}
  .lgx-welcome{margin-top:6px;font-size:0.92rem;line-height:1.55;color:var(--bark,#B8B2A6);}
  </style>
  <script>
  (function(){
    var nav=document.querySelector('nav');
    var w=document.createElement('div');
    w.className='lgx-banner';
    w.innerHTML='<div class="lgx-team">LGX · Legio_Fenix</div><div class="lgx-welcome" style="display:none">Danzo, el gran guerrero y táctico. Leyenda, fiel a su nombre.<br>Leales, serenos, sabios — con ellos, la alianza está segura. Bienvenidos.</div>';
    if(nav&&nav.parentNode){nav.parentNode.insertBefore(w,nav.nextSibling);}else{document.body.insertBefore(w,document.body.firstChild);}
    function sync(){var es=(localStorage.getItem('aoo-lang')==='es');w.querySelector('.lgx-welcome').style.display=es?'block':'none';}
    sync();
    document.querySelectorAll('#langBtn,#langBtnMobile').forEach(function(b){b.addEventListener('click',function(){setTimeout(sync,30);});});
  })();
  </script>
</body>
</html>
