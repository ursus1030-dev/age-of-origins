<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title data-en="Forum — Age of Origins" data-es="Foro — Age of Origins">Forum — Age of Origins</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --forest:    #1C1C1E;
      --forest-dk: #0B0B0B;
      --forest-lt: #2C2C2E;
      --terra:     #D4AF37;
      --terra-lt:  #8B6F2A;
      --cream:     #E8E6E1;
      --sand:      #1C1C1E;
      --bark:      #B8B2A6;
      --ink:       #E8E6E1;
      --gold:      #D4AF37;
      --red:       #B31217;
      --bg:        #0B0B0B;
    }

    html { scroll-behavior: smooth; }
    body { font-family: 'Jost', sans-serif; background: var(--bg); color: var(--ink); min-height: 100vh; }

    /* ── NAV ── */
    nav { position: sticky; top: 0; z-index: 100; background: rgba(11,11,11,0.96); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(212,175,55,0.25); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .nav-brand { font-family: 'Cinzel', serif; font-size: 1.25rem; color: var(--cream); letter-spacing: 0.04em; text-decoration: none; }
    .nav-links { display: flex; gap: 0.2rem; overflow-x: auto; scrollbar-width: none; flex: 1; justify-content: center; padding: 0 0.5rem; }
    .nav-links::-webkit-scrollbar { display: none; }
    .nav-links a { color: rgba(245,240,232,0.75); text-decoration: none; font-size: 0.78rem; font-weight: 400; letter-spacing: 0.08em; text-transform: uppercase; padding: 0.4rem 0.7rem; border-radius: 6px; transition: background 0.2s, color 0.2s; white-space: nowrap; }
    .nav-links a:hover, .nav-links a.active { background: rgba(212,175,55,0.15); color: var(--gold); }
    .nav-right { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; }
    .nav-lang, .nav-logout { background: none; border: 1px solid rgba(212,175,55,0.4); color: rgba(245,240,232,0.7); font-family: 'Jost', sans-serif; font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; padding: 0.35rem 0.7rem; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .nav-lang:hover, .nav-logout:hover { border-color: rgba(245,240,232,0.55); color: var(--cream); }
    .nav-hamburger { display: none; background: none; border: none; color: var(--cream); font-size: 1.6rem; cursor: pointer; padding: 0.3rem 0.6rem; line-height: 1; border-radius: 6px; transition: background 0.2s; }
    .nav-hamburger:hover { background: rgba(255,255,255,0.12); }
    .nav-mobile-footer { display: none !important; }
    @media (max-width: 900px) {
      nav { flex-wrap: wrap; height: auto; min-height: 56px; padding: 0 1rem; position: relative; }
      .nav-brand { flex: 1; }
      .nav-hamburger { display: flex; align-items: center; }
      .nav-right { display: none; }
      .nav-links { display: none; width: 100%; flex-direction: column; gap: 0; padding: 0.5rem 0 0.8rem; overflow-y: auto; max-height: calc(100svh - 60px); justify-content: flex-start; order: 3; border-top: 1px solid rgba(255,255,255,0.1); }
      .nav-links.open { display: flex; }
      .nav-links a { font-size: 0.95rem; padding: 0.7rem 1rem; white-space: normal; border-radius: 8px; }
      .nav-mobile-footer { display: flex !important; gap: 0.5rem; padding: 0.6rem 0.8rem 0.3rem; border-top: 1px solid rgba(255,255,255,0.1); margin-top: 0.2rem; }
    }

    /* ── HERO ── */
    .hero { background: linear-gradient(160deg, var(--forest-dk) 0%, var(--forest) 55%, var(--bark) 100%); padding: 2.2rem 2rem 1.6rem; text-align: center; position: relative; overflow: hidden; }
    .hero::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse at 60% 20%, rgba(201,169,110,0.18) 0%, transparent 60%); }
    .hero-content { position: relative; z-index: 1; max-width: 720px; margin: 0 auto; }
    .hero-icon { font-size: 2.2rem; line-height: 1; margin-bottom: 0.6rem; filter: drop-shadow(0 4px 20px rgba(0,0,0,0.3)); }
    .hero h1 { font-family: 'Cinzel', serif; font-size: clamp(1.8rem, 5vw, 2.4rem); font-weight: 300; color: var(--gold); letter-spacing: 0.04em; }
    .hero-sub { font-size: 0.85rem; font-weight: 300; color: rgba(245,240,232,0.75); max-width: 540px; margin: 0.5rem auto 0; line-height: 1.5; }

    /* ── FORUM LAYOUT ── */
    .forum-wrap { max-width: 1100px; margin: 0 auto; padding: 1.2rem 1rem 0; }
    .forum-layout { display: flex; flex-direction: column; background: var(--forest-lt); border: 1px solid rgba(212,175,55,0.15); border-radius: 14px; overflow: hidden; height: calc(100svh - 230px); min-height: 420px; }
    @media (min-width: 900px) {
      .forum-layout { flex-direction: row; height: calc(100svh - 210px); }
      .room-list { width: 220px; flex-shrink: 0; border-right: 1px solid rgba(212,175,55,0.15); border-bottom: none; flex-direction: column; overflow-x: visible; padding: 0.6rem 0; }
      .room-item { border-left: 3px solid transparent; border-bottom: none !important; }
      .room-item.active { border-left-color: var(--gold); }
    }

    .room-list { display: flex; overflow-x: auto; border-bottom: 1px solid rgba(212,175,55,0.15); scrollbar-width: none; }
    .room-list::-webkit-scrollbar { display: none; }
    .room-item { padding: 0.85rem 1.2rem; cursor: pointer; font-family: 'Jost', sans-serif; font-size: 0.85rem; letter-spacing: 0.02em; color: rgba(232,230,225,0.75); white-space: nowrap; border-bottom: 2px solid transparent; transition: background 0.15s, color 0.15s; }
    .room-item:hover { color: var(--cream); background: rgba(212,175,55,0.06); }
    .room-item.active { color: var(--gold); border-bottom-color: var(--gold); background: rgba(212,175,55,0.08); font-weight: 500; }

    .forum-main { flex: 1; display: flex; flex-direction: column; min-height: 0; min-width: 0; }
    .message-list { flex: 1; overflow-y: auto; padding: 1.1rem; display: flex; flex-direction: column; gap: 0.7rem; }
    .message-card { background: #232325; border-radius: 12px; padding: 0.7rem 1rem; max-width: 82%; box-shadow: 0 2px 12px rgba(0,0,0,0.15); align-self: flex-start; }
    .message-card.own { align-self: flex-end; background: rgba(212,175,55,0.10); border: 1px solid rgba(212,175,55,0.25); }
    .message-author { font-family: 'Cinzel', serif; font-size: 0.75rem; color: var(--gold); margin-bottom: 0.15rem; letter-spacing: 0.02em; }
    .message-text { font-size: 0.9rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; }
    .message-time { font-size: 0.66rem; color: rgba(232,230,225,0.4); margin-top: 0.3rem; }
    .message-row { display: flex; align-items: flex-end; gap: 0.4rem; }
    .message-row.own { flex-direction: row-reverse; }
    .msg-delete-btn { background: none; border: none; color: rgba(232,230,225,0.35); cursor: pointer; font-size: 0.8rem; padding: 0.3rem; line-height: 1; transition: color 0.15s; flex-shrink: 0; }
    .msg-delete-btn:hover { color: var(--red); }
    .empty-msg { margin: auto; text-align: center; color: rgba(232,230,225,0.4); font-size: 0.85rem; padding: 2rem; }

    .compose { display: flex; gap: 0.6rem; padding: 0.9rem 1rem; border-top: 1px solid rgba(212,175,55,0.15); background: rgba(0,0,0,0.15); }
    .compose textarea { flex: 1; resize: none; border-radius: 10px; border: 1px solid rgba(212,175,55,0.2); background: #2C2C2E; color: var(--ink); font-family: 'Jost', sans-serif; padding: 0.65rem 0.9rem; font-size: 0.88rem; outline: none; transition: border-color 0.2s; max-height: 5.5rem; }
    .compose textarea:focus { border-color: var(--gold); }
    .compose button { background: var(--terra); color: #0B0B0B; border: none; border-radius: 10px; padding: 0 1.3rem; font-family: 'Jost', sans-serif; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; font-size: 0.8rem; transition: background 0.2s; }
    .compose button:hover { background: var(--terra-lt); }
    .compose button:disabled { opacity: 0.5; cursor: default; }

    /* ── FOOTER ── */
    footer { background: var(--forest-dk); color: rgba(245,240,232,0.4); text-align: center; padding: 2rem; font-size: 0.75rem; letter-spacing: 0.1em; margin-top: 2rem; }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a class="nav-brand" href="index.html" data-en="🏰 Age of Origins" data-es="🏰 Age of Origins">🏰 Age of Origins</a>
    <button class="nav-hamburger" onclick="toggleNav()" aria-label="Menu">&#9776;</button>
    <div class="nav-links" id="navLinks">
      <a href="index.html"     data-en="Home"      data-es="Inicio">Home</a>
      <a href="base.html"      data-en="Base"      data-es="Base">Base</a>
      <a href="combat.html"    data-en="Combat"    data-es="Combate">Combat</a>
      <a href="alliance.html"  data-en="Alliance"  data-es="Alianza">Alliance</a>
      <a href="tips.html"      data-en="Tips"      data-es="Consejos">Tips</a>
      <a href="events.html"    data-en="Events"    data-es="Eventos">Events</a>
      <a href="group.html"     data-en="Group"     data-es="Grupo">Group</a>
      <a href="forum.html" class="active" data-en="Forum" data-es="Foro">Forum</a>
      <a href="resources.html" data-en="Resources" data-es="Recursos">Resources</a>
      <div class="nav-mobile-footer">
        <button class="nav-lang"   id="langBtnMobile" onclick="toggleLang()">ES</button>
        <button class="nav-logout" onclick="logOut()" data-en="Log out" data-es="Cerrar sesión">Log out</button>
      </div>
    </div>
    <div class="nav-right">
      <button class="nav-lang"   id="langBtn"   onclick="toggleLang()">ES</button>
      <button class="nav-logout" onclick="logOut()" data-en="Log out" data-es="Cerrar sesión">Log out</button>
    </div>
  </nav>

  <!-- HERO -->
  <header class="hero">
    <div class="hero-content">
      <div class="hero-icon">💬</div>
      <h1 data-en="Forum" data-es="Foro">Forum</h1>
      <p class="hero-sub"
         data-en="Talk to the alliance. Pick a room on the left, write below."
         data-es="Habla con la alianza. Elige una sala a la izquierda, escribe abajo.">
        Talk to the alliance. Pick a room on the left, write below.
      </p>
    </div>
  </header>

  <!-- FORUM -->
  <div class="forum-wrap">
    <div class="forum-layout">
      <div class="room-list" id="roomList"></div>
      <div class="forum-main">
        <div class="message-list" id="messageList">
          <div class="empty-msg" data-en="Loading…" data-es="Cargando…">Loading…</div>
        </div>
        <div class="compose">
          <textarea id="composeInput" rows="1"
            data-en-placeholder="Write a message…" data-es-placeholder="Escribe un mensaje…"
            placeholder="Write a message…"></textarea>
          <button id="sendBtn" data-en="Send" data-es="Enviar">Send</button>
        </div>
      </div>
    </div>
  </div>

  <footer>
    <p>Age of Origins Guide &nbsp;·&nbsp; <span data-en="By the alliance, for the alliance" data-es="De la alianza, para la alianza">By the alliance, for the alliance</span> &nbsp;·&nbsp; <script>document.write(new Date().getFullYear())</script></p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL  = 'https://fnmfeanfibsbqbogslpm.supabase.co';
    const SUPABASE_ANON = 'sb_publishable_s4Mdp7ixNPfo7b7Bz-BpPg_gcJroIXK';

    // Recovery/invite-hash -> login
    const _h = window.location.hash, _s = window.location.search;
    if ((_h && (_h.includes('type=recovery') || _h.includes('type=invite'))) || (_s && _s.includes('code='))) {
      window.location.replace('login.html' + _s + _h);
    }

    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON, { auth: { flowType: 'pkce' } });

    let profile = null;
    let currentRoomId = null;
    let pollTimer = null;
    let roomsCache = [];

    function logOut() { sb.auth.signOut().then(() => { window.location.href = 'login.html?logout=1'; }); }

    sb.auth.getSession().then(async ({ data }) => {
      if (!data?.session) { window.location.href = 'login.html?logout=1'; return; }
      const uid = data.session.user.id;
      const { data: profRow, error: profErr } = await sb.from('profiles').select('*').eq('id', uid).single();
      if (profErr || !profRow) { console.error('No profile row', profErr); return; }
      profile = profRow;
      await loadRooms();
    });

    async function loadRooms() {
      const { data: rooms, error } = await sb.from('rooms').select('*').order('sort_order');
      if (error) { console.error(error); return; }
      roomsCache = rooms || [];
      renderRoomList();
      if (roomsCache.length) selectRoom(roomsCache[0].id);
    }

    function renderRoomList() {
      const el = document.getElementById('roomList');
      el.innerHTML = '';
      roomsCache.forEach(r => {
        const div = document.createElement('div');
        div.className = 'room-item' + (r.id === currentRoomId ? ' active' : '');
        div.textContent = LANG === 'es' ? r.name_es : r.name_en;
        div.dataset.roomId = r.id;
        div.onclick = () => selectRoom(r.id);
        el.appendChild(div);
      });
    }

    async function selectRoom(id) {
      currentRoomId = id;
      renderRoomList();
      await loadMessages();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(loadMessages, 10000);
    }

    async function loadMessages() {
      if (!currentRoomId) return;
      const { data: messages, error } = await sb
        .from('messages')
        .select('id, content, created_at, author_id, profiles(username)')
        .eq('room_id', currentRoomId)
        .order('created_at', { ascending: true })
        .limit(200);
      if (error) { console.error(error); return; }
      renderMessages(messages || []);
    }

    function renderMessages(messages) {
      const el = document.getElementById('messageList');
      const wasAtBottom = el.scrollTop + el.clientHeight >= el.scrollHeight - 40;
      el.innerHTML = '';
      if (!messages.length) {
        const empty = document.createElement('div');
        empty.className = 'empty-msg';
        empty.textContent = LANG === 'es' ? 'Aún no hay mensajes. Sé el primero.' : 'No messages yet. Be the first.';
        el.appendChild(empty);
      }
      messages.forEach(m => {
        const isOwn = m.author_id === profile.id;
        const canDelete = isOwn || profile.is_core;
        const row = document.createElement('div');
        row.className = 'message-row' + (isOwn ? ' own' : '');
        const div = document.createElement('div');
        div.className = 'message-card' + (isOwn ? ' own' : '');
        const author = m.profiles ? m.profiles.username : '?';
        const time = new Date(m.created_at).toLocaleTimeString(LANG === 'es' ? 'es-ES' : 'en-US', { hour: '2-digit', minute: '2-digit' });
        const a = document.createElement('div'); a.className = 'message-author'; a.textContent = author;
        const t = document.createElement('div'); t.className = 'message-text'; t.textContent = m.content;
        const ti = document.createElement('div'); ti.className = 'message-time'; ti.textContent = time;
        div.appendChild(a); div.appendChild(t); div.appendChild(ti);
        row.appendChild(div);
        if (canDelete) {
          const del = document.createElement('button');
          del.className = 'msg-delete-btn';
          del.innerHTML = '<i class="fa-solid fa-trash"></i>';
          del.title = LANG === 'es' ? 'Eliminar' : 'Delete';
          del.onclick = () => deleteMessage(m.id);
          row.appendChild(del);
        }
        el.appendChild(row);
      });
      if (wasAtBottom) el.scrollTop = el.scrollHeight;
    }

    async function sendMessage() {
      const ta = document.getElementById('composeInput');
      const text = ta.value.trim();
      if (!text || !currentRoomId) return;
      const btn = document.getElementById('sendBtn');
      ta.disabled = true; btn.disabled = true;
      const { error } = await sb.from('messages').insert({ room_id: currentRoomId, author_id: profile.id, content: text });
      ta.disabled = false; btn.disabled = false;
      if (error) { alert(error.message); return; }
      ta.value = '';
      await loadMessages();
      const el = document.getElementById('messageList');
      el.scrollTop = el.scrollHeight;
    }

    async function deleteMessage(id) {
      const ok = confirm(LANG === 'es' ? '¿Eliminar este mensaje?' : 'Delete this message?');
      if (!ok) return;
      const { error } = await sb.from('messages').delete().eq('id', id);
      if (error) { alert(error.message); return; }
      await loadMessages();
    }

    document.getElementById('composeInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });
    document.getElementById('sendBtn').addEventListener('click', sendMessage);

    // ── NAV TOGGLE ──
    function toggleNav() { document.getElementById('navLinks').classList.toggle('open'); }
    document.addEventListener('DOMContentLoaded', function() {
      const nl = document.getElementById('navLinks');
      if (nl) nl.querySelectorAll('a').forEach(a => a.addEventListener('click', () => { if (a.getAttribute('href') !== 'forum.html') nl.classList.remove('open'); }));
    });

    // ── SPRÅKVÄLJARE ──
    let LANG = localStorage.getItem('aoo-lang') || 'en';
    function applyLang(lang) {
      LANG = lang;
      document.documentElement.lang = lang;
      document.querySelectorAll('[data-en][data-es]').forEach(el => {
        const txt = el.dataset[lang];
        if (txt !== undefined) {
          if (el.children.length === 0) el.textContent = txt;
          else el.firstChild.textContent = txt;
        }
      });
      document.querySelectorAll('[data-en-placeholder][data-es-placeholder]').forEach(el => {
        el.placeholder = lang === 'es' ? el.dataset.esPlaceholder : el.dataset.enPlaceholder;
      });
      const otherLabel = lang === 'en' ? 'ES' : 'EN';
      document.querySelectorAll('#langBtn, #langBtnMobile').forEach(b => b.textContent = otherLabel);
      localStorage.setItem('aoo-lang', lang);
      if (roomsCache.length) renderRoomList();
      if (currentRoomId) loadMessages();
    }
    function toggleLang() { applyLang(LANG === 'en' ? 'es' : 'en'); }
    applyLang(LANG);

    // ── VERSION-CHECK ──
    (function() {
      setInterval(function() {
        fetch('version.json?t=' + Date.now()).then(r => r.json()).then(function(d) {
          const stored = localStorage.getItem('aoo-version');
          if (!stored) { localStorage.setItem('aoo-version', d.version); return; }
          if (d.version !== stored && !document.getElementById("update-banner")) {
            var b = document.createElement("div");
            b.id = "update-banner";
            b.style.cssText = "position:fixed;bottom:0;left:0;right:0;background:#1C1C1E;color:#E8E6E1;text-align:center;padding:0.75rem 1rem;z-index:9999;font-family:Jost,sans-serif;font-size:0.9rem;display:flex;align-items:center;justify-content:center;gap:1rem;box-shadow:0 -2px 12px rgba(0,0,0,0.2);";
            const reloadTxt = LANG === 'es' ? 'Recargar' : 'Reload';
            const msgTxt    = LANG === 'es' ? '✨ ¡Sitio actualizado!' : '✨ Site updated!';
            b.innerHTML = msgTxt + " <button onclick='location.reload(true)' style='background:#D4AF37;color:#0B0B0B;border:none;padding:0.35rem 0.9rem;border-radius:6px;cursor:pointer;font-weight:600;font-family:Jost,sans-serif;'>" + reloadTxt + "</button>";
            document.body.appendChild(b);
          }
        }).catch(function(){});
      }, 300000);
    })();
  </script>
</body>
</html>
